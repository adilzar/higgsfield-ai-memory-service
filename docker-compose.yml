services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: memory
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory"]
      interval: 2s
      timeout: 3s
      retries: 10

  service:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://memory:memory@db:5432/memory
      DATABASE_URL_SYNC: postgresql://memory:memory@db:5432/memory
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
