services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_NAME:-memory}
      POSTGRES_USER: ${DB_USER:-memory}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-memory}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-memory}"]
      interval: 2s
      timeout: 3s
      retries: 10

  service:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-memory}
      DB_USER: ${DB_USER:-memory}
      DB_PASSWORD: ${DB_PASSWORD:-memory}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
